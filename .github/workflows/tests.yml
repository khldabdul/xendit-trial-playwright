# Playwright Test CI/CD Pipeline
#
# Runs tests on push and pull requests to main branch.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Type Checking and Linting
  # ============================================================================
  type-check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm type-check

      - name: Run ESLint
        run: pnpm lint

  # ============================================================================
  # E2E Tests - Xendit
  # ============================================================================
  e2e-xendit:
    name: E2E - Xendit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Xendit E2E tests
        env:
          CI: true
          XENDIT_API_KEY: ${{ secrets.XENDIT_API_KEY }}
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xendit-e2e-test-results
          path: cucumber-report/
          retention-days: 30

  # ============================================================================
  # API Tests - Xendit
  # ============================================================================
  api-xendit:
    name: API - Xendit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Xendit API tests
        env:
          CI: true
          XENDIT_API_KEY: ${{ secrets.XENDIT_API_KEY }}
        run: pnpm test:api

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xendit-api-test-results
          path: cucumber-report/
          retention-days: 30

  # ============================================================================
  # Generate BDD HTML Report
  # ============================================================================
  bdd-report:
    name: BDD Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e-xendit, api-xendit]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-test-results'
          path: cucumber-report/
          merge-multiple: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate BDD HTML report
        run: pnpm report

      - name: Upload BDD HTML report
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-report
          path: cucumber-report/html-report/
          retention-days: 30

      # Publish to GitHub Pages
      - name: Publish BDD Report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cucumber-report/html-report
          publish_branch: gh-pages
          force_orphan: true

  # ============================================================================
  # PR Comment with Test Results
  # ============================================================================
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [bdd-report]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            let comment = '## 🧪 Test Execution Finished\n\n';
            comment += '📊 BDD Test Report is available in workflow artifacts.\n';
            comment += '\n> **Note:** To enable GitHub Pages for reports, go to repo **Settings > Pages** and select source: `gh-pages` branch.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
